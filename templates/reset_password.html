{% extends "index.html" %}
{% block content %}

<style>
    :root {
        --primary-gradient: linear-gradient(135deg, hsl(285, 89%, 34%), hsl(285, 97%, 22%));
        --card-gradient-hover: linear-gradient(135deg, #ffffff, #fdfaff);
        --border-radius-lg: 24px;
        --border-radius-md: 16px;
        --border-radius-sm: 12px;
        --transition-smooth: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        --brand-main: hsl(285, 89%, 34%);
        --brand-main-hover: hsl(285, 97%, 22%);
        --purple-glow: rgba(114, 9, 183, 0.08);
    }

    /* ==========================================
       BACKGROUND & LAYOUT CORE SYSTEM
    ========================================== */
    body {
        background: linear-gradient(135deg, #f9f8fa, #f2edf7);
        font-family: "Segoe UI", system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
    }

    /* ==========================================
       PREMIUM DYNAMIC CARD ARCHITECTURE
    ========================================== */
    .contact-premium-card {
        border-radius: var(--border-radius-lg);
        border: 1px solid rgba(114, 9, 183, 0.05);
        background: #ffffff;
        box-shadow: 0 10px 30px rgba(114, 9, 183, 0.03);
        transition: var(--transition-smooth);
    }

    .contact-premium-card:hover {
        box-shadow: 0 20px 50px rgba(114, 9, 183, 0.09);
    }

    .contact-block-title {
        font-weight: 800;
        color: #231c26;
        font-size: 1.35rem;
        letter-spacing: -0.3px;
        position: relative;
        padding-bottom: 10px;
    }

    .contact-block-title::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 0;
        width: 45px;
        height: 4px;
        background: var(--primary-gradient);
        border-radius: 10px;
    }

    /* ==========================================
       INPUT MODULES & UTILITIES
    ========================================== */
    .form-control {
        border-radius: var(--border-radius-sm);
        padding: 14px 18px;
        border: 1px solid #e4daeb;
        background-color: #faf9fc;
        transition: var(--transition-smooth);
        color: #333333;
        font-weight: 500;
    }

    .form-control:focus {
        border-color: var(--brand-main);
        background-color: #ffffff;
        box-shadow: 0 0 0 5px rgba(114, 9, 183, 0.14);
        outline: none;
    }

    /* Seamless look for input groups with buttons */
    .input-group .form-control {
        border-top-right-radius: 0;
        border-bottom-right-radius: 0;
    }

    .btn-toggle-password {
        border: 1px solid #e4daeb;
        border-left: none;
        background-color: #faf9fc;
        color: var(--brand-main);
        font-weight: 600;
        padding: 0 20px;
        border-top-right-radius: var(--border-radius-sm) !important;
        border-bottom-right-radius: var(--border-radius-sm) !important;
        transition: var(--transition-smooth);
    }

    .input-group:focus-within .btn-toggle-password {
        border-color: var(--brand-main);
        background-color: #ffffff;
    }

    .btn-toggle-password:hover {
        background-color: #f3ebf7;
        color: var(--brand-main-hover);
    }

    /* ==========================================
       INTERACTIVE BUTTON ACTIONS
    ========================================== */
    .btn-contact-action {
        background: var(--primary-gradient) !important;
        border: none !important;
        color: #ffffff !important;
        border-radius: 50px;
        font-weight: 700;
        padding: 14px 32px;
        letter-spacing: 0.3px;
        transition: var(--transition-smooth);
        box-shadow: 0 6px 20px rgba(114, 9, 183, 0.2);
    }

    .btn-contact-action:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 25px rgba(114, 9, 183, 0.35);
    }

    .text-brand-purple {
        color: var(--brand-main) !important;
    }
</style>

<div class="container py-5">
    <!-- Header Section -->
    <div class="text-center mb-5 pb-2">
        <h6 class="text-brand-purple fw-bold text-uppercase tracking-widest mb-2" style="font-size: 0.8rem; letter-spacing: 2px;">Security Update</h6>
        <h2 class="fw-bold display-5 text-brand-purple mb-3" style="letter-spacing: -1.5px;">Account Protection</h2>
        <p class="text-muted lead mx-auto" style="max-width: 580px; font-size: 1.1rem; font-weight: 500;">Ensure your credentials are safe by establishing a strong, personalized new access key.</p>
    </div>

    <!-- Central Password Box Setup -->
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card contact-premium-card p-4 p-md-5">
                <h4 class="contact-block-title mb-4">Create New Password</h4>

                <form method="POST">

    <div class="mb-3">
        <input type="password"
               name="password"
               class="form-control"
               placeholder="New Password"
               required>
    </div>

    <div class="mb-3">
        <input type="password"
               name="confirm_password"
               class="form-control"
               placeholder="Confirm Password"
               required>
    </div>

    <button type="submit" class="btn btn-success w-100">
        Update Password
    </button>

</form>
            </div>
        </div>
    </div>
</div>

<script>
function togglePassword() {
    const passwordInput = document.getElementById("password");
    const btn = document.getElementById("toggleBtn");

    if (passwordInput.type === "password") {
        passwordInput.type = "text";
        btn.innerText = "Hide";
    } else {
        passwordInput.type = "password";
        btn.innerText = "Show";
    }
}
</script>

{% endblock %}
