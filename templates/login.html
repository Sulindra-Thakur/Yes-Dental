{% extends "index.html" %}
{% block content %}

<style>
    :root {
        --primary-gradient: linear-gradient(180deg, hsl(285, 89%, 30%), hsl(285, 97%, 20%));
        --header-gradient: linear-gradient(135deg, hsl(285, 89%, 34%), hsl(285, 97%, 25%));
        --bg-hover: #fdf8ff;
        --border-radius-lg: 22px;
        --border-radius-md: 14px;
        --border-radius-sm: 10px;
        --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        --brand-main: hsl(285, 89%, 34%);
        --brand-main-hover: hsl(285, 97%, 25%);
    }

    /* ==========================================
       BACKGROUND & LAYOUT CORE SYSTEM
    ========================================== */
    body {
        background: linear-gradient(135deg, #f8f6fa, #f0eaf5);
        font-family: "Segoe UI", system-ui, sans-serif;
    }

    .min-vh-75 {
        min-height: 75vh;
    }

    /* ==========================================
       MODULAR LOGIN CARD ARCHITECTURE
    ========================================== */
    .login-premium-card {
        border-radius: var(--border-radius-lg);
        border: none;
        background: #ffffff;
        box-shadow: 0 15px 35px rgba(114, 9, 183, 0.05);
        transition: var(--transition-smooth);
    }

    .login-premium-card:hover {
        transform: translateY(-6px);
        box-shadow: 0 25px 55px rgba(114, 9, 183, 0.12);
    }

    /* PREMIUM CARD HEADER CONTAINER */
    .login-card-header {
        background: var(--header-gradient) !important;
        border: none;
        position: relative;
        overflow: hidden;
    }

    .login-card-header::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image: url("https://www.transparenttextures.com/patterns/cubes.png");
        opacity: 0.08;
    }

    /* ==========================================
       INPUT CONTROLS & COMPONENT STYLES
    ========================================== */
    .form-control {
        border-radius: var(--border-radius-sm);
        padding: 11px 14px;
        border: 1px solid #e2d9e6;
        background-color: #faf8fb;
        transition: var(--transition-smooth);
        color: #333333;
    }

    .form-control:focus {
        border-color: var(--brand-main);
        background-color: #ffffff;
        box-shadow: 0 0 0 4px rgba(114, 9, 183, 0.12);
        outline: none;
    }

    /* DYNAMIC ICON COMPONENT WRAPPER */
    .input-group-text {
        background: #f3edf7;
        border: 1px solid #e2d9e6;
        color: var(--brand-main);
        padding-left: 15px;
        padding-right: 15px;
        transition: var(--transition-smooth);
    }

    .input-group-text.left-addon {
        border-right: none;
        border-radius: var(--border-radius-sm) 0 0 var(--border-radius-sm);
    }

    .input-group-text.password-toggle {
        border-left: none;
        border-radius: 0 var(--border-radius-sm) var(--border-radius-sm) 0;
        cursor: pointer;
        background: #faf8fb;
    }

    .input-group-text.password-toggle:hover {
        background: #f3edf7;
        color: var(--brand-main-hover);
    }

    /* CHECKBOX OVERRIDE SYSTEM */
    .form-check-input:checked {
        background-color: var(--brand-main) !important;
        border-color: var(--brand-main) !important;
    }

    /* ==========================================
       PRIMARY ACTION SUBMISSION ENGINE
    ========================================== */
    .btn-login-action {
        background: var(--brand-main) !important;
        border-color: var(--brand-main) !important;
        color: #ffffff !important;
        border-radius: 50px;
        font-weight: 700;
        padding: 12px 20px;
        transition: var(--transition-smooth);
        box-shadow: 0 4px 15px rgba(114, 9, 183, 0.15);
    }

    .btn-login-action:hover {
        background: var(--brand-main-hover) !important;
        border-color: var(--brand-main-hover) !important;
        transform: translateY(-2px);
        box-shadow: 0 8px 22px rgba(114, 9, 183, 0.25);
    }

    /* HYPERLINK ARCHITECTURE ROUTING */
    .text-link-purple {
        color: var(--brand-main) !important;
        transition: var(--transition-smooth);
    }

    .text-link-purple:hover {
        color: var(--brand-main-hover) !important;
        text-decoration: underline !important;
    }

    hr {
        opacity: 0.12;
        border-color: var(--brand-main);
    }
</style>

<div class="row justify-content-center align-items-center min-vh-75">
    <div class="col-md-6 col-lg-4">

        <div class="card login-premium-card shadow-lg border-0 overflow-hidden">

            <div class="card-header login-card-header text-white text-center py-4">
                <div class="position-relative">
                    <i class="fas fa-tooth fa-3x mb-2 text-white"></i>
                    <h3 class="mb-0 fw-bold" style="letter-spacing: -0.5px;">Welcome Back</h3>
                    <p class="mb-0 text-white-50 small fw-semibold">Login to your patient portal</p>
                </div>
            </div>

            <div class="card-body p-4 p-md-5">

                <form method="POST" action="{{ url_for('login') }}">

                    <div class="mb-4">
                        <label class="form-label fw-bold text-muted small text-uppercase">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text left-addon"><i class="fas fa-envelope"></i></span>
                            <input type="email" class="form-control" name="email"
                                placeholder="name@example.com" style="border-radius: 0 var(--border-radius-sm) var(--border-radius-sm) 0;" required autofocus>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold text-muted small text-uppercase">Password</label>
                        <div class="input-group">
                            <span class="input-group-text left-addon"><i class="fas fa-lock"></i></span>
                            <input type="password" class="form-control" id="password" name="password"
                                placeholder="Enter your password" style="border-radius: 0;" required>

                            <span class="input-group-text password-toggle" onclick="togglePassword(this)">
                                <i class="fas fa-eye"></i>
                            </span>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="remember">
                            <label class="form-check-label text-muted small fw-semibold" for="remember">Remember me</label>
                        </div>
                        <a href="{{ url_for('forgot_password') }}" class="small fw-bold text-decoration-none text-link-purple">
                            Forgot Password?
                        </a>
                    </div>

                    <button type="submit" class="btn btn-login-action w-100 py-2.5 fs-5 shadow-sm">
                        Login to Dashboard
                    </button>

                </form>

                <div class="text-center my-4 position-relative">
                    <span class="text-muted small bg-white px-2 position-relative" style="z-index: 2;">or</span>
                    <hr class="position-absolute w-100 top-50 start-0 m-0">
                </div>

                <div class="text-center">
                    <p class="text-muted mb-1 small fw-semibold">Don't have an account?</p>
                    <a href="{{ url_for('register') }}" class="fw-bold text-decoration-none text-link-purple">
                        Create a new account
                    </a>
                </div>

            </div>
        </div>

        <div class="text-center mt-4 text-muted small fw-semibold opacity-75">
            <i class="fas fa-shield-alt text-link-purple me-1"></i>
            Secure 256-bit SSL Encrypted Connection
        </div>

    </div>
</div>

<script>
function togglePassword(element) {
    const passwordField = document.getElementById("password");
    const icon = element.querySelector("i");

    if (passwordField.type === "password") {
        passwordField.type = "text";
        icon.classList.remove("fa-eye");
        icon.classList.add("fa-eye-slash");
    } else {
        passwordField.type = "password";
        icon.classList.remove("fa-eye-slash");
        icon.classList.add("fa-eye");
    }
}
</script>

{% endblock %}
